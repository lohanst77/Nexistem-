# Configuration Netlify pour Nexistem
# Déploiement via GitHub → Netlify

[build]
  publish = "."    # le site est à la racine

# Redirections pour les formulaires (optionnel — à personnaliser)
[[redirects]]
  from = "/merci"
  to   = "/index.html"
  status = 200

# En-têtes de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
